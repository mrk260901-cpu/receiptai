name: receipt_ai
description: ReceiptAI - AI-Powered Smart Receipt Scanner & Expense Tracker

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cloud_firestore: ^4.14.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_storage: ^11.6.0
  
  # Google Gemini AI SDK
  google_generative_ai: ^0.2.0
  
  # Image & OCR Utilities
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  camera: ^0.10.5+8
  
  # Charts and Analytics
  fl_chart: ^0.66.0
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  file_picker: ^8.0.0
  uuid: ^4.3.3
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/
